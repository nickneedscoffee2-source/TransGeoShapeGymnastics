    const COLOR_PRESETS = [

      { name: 'Pink Magenta', fill: 'rgba(236, 72, 153, 0.8)', border: '#be185d' },
    ];

    const getAbsoluteCoords = (pivot, blocks) => {
      return blocks.map(b => ({ x: pivot.x + b.x, y: pivot.y + b.y }));
    };

    const checkCollision = (absCoords, obstacles) => {
      for (let coord of absCoords) {
        const gridX = Math.floor(coord.x);
        const gridY = Math.floor(coord.y);
        if (gridX < 0 || gridX >= GRID_W || gridY < 0 || gridY >= GRID_H) return true;
        if (obstacles.some(obs => obs.x === gridX && obs.y === gridY)) return true;
      }
      return false;
    };

    const checkWin = (currentCoords, targetCoords) => {
      if (currentCoords.length !== targetCoords.length) return false;
      for (let cc of currentCoords) {
        if (!targetCoords.some(tc => Math.abs(tc.x - cc.x) < 0.1 && Math.abs(tc.y - cc.y) < 0.1)) {
          return false;
        }
      }
      return true;
    };

    // --- MAIN COMPONENT ---
    const App = () => {
      const canvasRef = useRef(null);
      const containerRef = useRef(null);

      // Student Account Setup States
      const [studentName, setStudentName] = useState('');
      const [classPeriod, setClassPeriod] = useState('');
      const [gameStarted, setGameStarted] = useState(false);

      // Score Tracking States
      const [sheetStatus, setSheetStatus] = useState('idle'); // idle, sending, success, error
      const [seconds, setSeconds] = useState(0);

      const [levelIdx, setLevelIdx] = useState(0);
      const [variationIdx, setVariationIdx] = useState(0);
      const [status, setStatus] = useState('playing'); // playing, won, crashed
      const [message, setMessage] = useState('');
      const [history, setHistory] = useState([]); // Array of { pivot, blocks, type }

      // Responsive Grid Cell Sizing State
      const [cellSize, setCellSize] = useState(40);

      // Memoized Dynamic Canvas scale limits
      const canvasWidth = useMemo(() => GRID_W * cellSize, [cellSize]);
      const canvasHeight = useMemo(() => GRID_H * cellSize, [cellSize]);

      // Responsive Size Observer layout tracker hook
      useEffect(() => {
        if (!containerRef.current || !gameStarted) return;

        const observer = new ResizeObserver((entries) => {
          for (let entry of entries) {
            const { width, height } = entry.contentRect;
            const calculatedSize = Math.min(width / GRID_W, height / GRID_H);
            setCellSize(Math.max(16, Math.min(40, Math.floor(calculatedSize))));
          }
        });

        observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, [gameStarted]);

      // Live Timer/Stopwatch Hook
      useEffect(() => {
        let timerId = null;
        if (status === 'playing' && gameStarted) {
          timerId = setInterval(() => {
            setSeconds(prev => prev + 1);
          }, 1000);
        }
        return () => {
          if (timerId) clearInterval(timerId);
        };
      }, [status, gameStarted]);

      // Drag State Tracker
      const [isDragging, setIsDragging] = useState(false);

      // Custom Perk Unlocks
      const [colorPickerUnlocked, setColorPickerUnlocked] = useState(false);
      const [selectedColor, setSelectedColor] = useState(COLOR_PRESETS[0]);

      // Trophy Screen triggers
      const [showTrophyCelebration, setShowTrophyCelebration] = useState(false);

      // Challenge conditions satisfied this run
      const [challengeCompleted, setChallengeCompleted] = useState(false);

      // Current Shape State
      const [pivot, setPivot] = useState({ x: 0, y: 0 });
      const [blocks, setBlocks] = useState([]);

      // Command UI State
      const [activeTab, setActiveTab] = useState('translate');
      const [transDistX, setTransDistX] = useState(0);
      const [transDirX, setTransDirX] = useState('right');
      const [transDistY, setTransDistY] = useState(0);
      const [transDirY, setTransDirY] = useState('up');
      const [rotAngle, setRotAngle] = useState('90'); 
      const [rotDir, setRotDir] = useState('cw'); 
      const [reflectAxis, setReflectAxis] = useState('vertical'); 

      // Dynamically fetch current active configuration
      const level = useMemo(() => {
        return LEVEL_VARIATIONS[levelIdx][variationIdx];
      }, [levelIdx, variationIdx]);

      // Handle Level or Variation load
      useEffect(() => {
        if (!gameStarted) return;
        setPivot(level.startPivot);
        setBlocks(level.startBlocks);
        setStatus('playing');
        setMessage('');
        setHistory([]);
        setSeconds(0);
        setChallengeCompleted(false);
        setSheetStatus('idle');
        resetCommandUI();
      }, [level, gameStarted]);

      // Automatically select a random variation on level index swap
      useEffect(() => {
        if (!gameStarted) return;
        const randomVarIdx = Math.floor(Math.random() * 5);
        setVariationIdx(randomVarIdx);
      }, [levelIdx, gameStarted]);

      const resetCommandUI = () => {
        setTransDistX(0);
        setTransDistY(0);
        setRotAngle('90');
        setReflectAxis('vertical');
      };

      // Select a new random puzzle from the database for the active level
      const rerollVariation = () => {
        let nextVarIdx;
        do {
          nextVarIdx = Math.floor(Math.random() * 5);
        } while (nextVarIdx === variationIdx); 
        setVariationIdx(nextVarIdx);
        setShowTrophyCelebration(false);
      };

      // Calculate pending preview transformation (the "Preview")
      const pendingState = useMemo(() => {
        let nextPivot = { ...pivot };
        let nextBlocks = [...blocks];

        if (activeTab === 'translate') {
          const dx = (transDirX === 'right' ? 1 : -1) * transDistX;
          const dy = (transDirY === 'up' ? 1 : -1) * transDistY;
          nextPivot = { x: pivot.x + dx, y: pivot.y + dy };
        } 
        else if (activeTab === 'rotate') {
          let angle = parseInt(rotAngle);
          if (rotDir === 'ccw') angle = 360 - angle;
          
          nextBlocks = blocks.map(b => {
            if (angle === 90) return { x: b.y, y: -b.x }; 
            if (angle === 180) return { x: -b.x, y: -b.y }; 
            if (angle === 270) return { x: -b.y, y: b.x }; 
            return b;
          });
        }
        else if (activeTab === 'reflect') {
          nextBlocks = blocks.map(b => {
            if (reflectAxis === 'vertical') return { x: -b.x, y: b.y }; 
            if (reflectAxis === 'horizontal') return { x: b.x, y: -b.y }; 
            return b;
          });
        }

        return { pivot: nextPivot, blocks: nextBlocks };
      }, [pivot, blocks, activeTab, transDistX, transDirX, transDistY, transDirY, rotAngle, rotDir, reflectAxis]);

      // Calculate score breakdown matching teacher's spreadsheet
      const calculateScore = (moveCount, finalSeconds, isChallengeMet) => {
        const baseScore = 1000;
        const speedBonus = Math.max(0, (120 - finalSeconds) * 5);
        const efficiencyBonus = Math.max(0, (level.parMoves - moveCount) * 200);
        const challengeBonus = isChallengeMet ? 500 : 0;
        return baseScore + speedBonus + efficiencyBonus + challengeBonus;
      };

      // Logging payload submission function to Google Sheets
      const logProgressToGoogleSheets = async (finalHistory, isChallengeMet) => {
        if (!GOOGLE_SCRIPT_URL) {
          console.log("No Google Script App URL configured. Playing offline.");
          return;
        }

        setSheetStatus('sending');
        const translations = finalHistory.filter(h => h.type === 'translate').length;
        const rotations = finalHistory.filter(h => h.type === 'rotate').length;
        const reflections = finalHistory.filter(h => h.type === 'reflect').length;
        const totalMoves = finalHistory.length;
        const score = calculateScore(totalMoves, seconds, isChallengeMet);

        // Construct standard class progress model payloads
        const payload = {
          studentName: studentName,
          classPeriod: classPeriod || "N/A",
          levelId: level.id,
          puzzleVariation: level.variationLabel,
          translations: translations,
          rotations: rotations,
          reflections: reflections,
          totalMoves: totalMoves,
          parMoves: level.parMoves,
          time: seconds,
          solved: "Yes",
          challengeCompleted: isChallengeMet ? "Yes" : "No",
          score: score
        };

        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // Avoids cross-origin preflight blockers
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          setSheetStatus('success');
        } catch (error) {
          console.error("Sheets log pipeline broken: ", error);
          setSheetStatus('error');
        }
      };

      // Execute Command
      const commitMovement = () => {
        if (status !== 'playing') return;

        // Record action context
        const actionRecord = { pivot, blocks, type: activeTab };
        const updatedHistory = [...history, actionRecord];
        setHistory(updatedHistory);

        const absPendingCoords = getAbsoluteCoords(pendingState.pivot, pendingState.blocks);
        
        // Check Collision
        if (checkCollision(absPendingCoords, level.obstacles)) {
          setStatus('crashed');
          setMessage("Crash! The shape hit an obstacle or moved out of grid bounds.");
          return;
        }

        // Apply Transformation
        setPivot(pendingState.pivot);
        setBlocks(pendingState.blocks);
        resetCommandUI();

        // Check Win Condition
        const targetAbsCoords = getAbsoluteCoords(level.targetPivot, level.targetBlocks);
        if (checkWin(absPendingCoords, targetAbsCoords)) {
          setStatus('won');
          const isChallengeMet = level.checkChallenge(updatedHistory);
          setChallengeCompleted(isChallengeMet);

          // Submit student score metrics asynchronously
          logProgressToGoogleSheets(updatedHistory, isChallengeMet);

          if (level.id === 5) {
            setTimeout(() => {
              setShowTrophyCelebration(true);
            }, 600);
          } else if (level.id === 6) {
            setColorPickerUnlocked(true);
            setMessage(`Amazing job, ${studentName}! You beat the Bonus Level and unlocked Custom Shape Colors! Choose a new color from the customization panel!`);
          } else {
            setMessage(`Terrific! You completed the objective.${isChallengeMet ? " And you solved the optional Challenge Objective! ⭐" : ""}`);
          }
        }
      };

      const undo = () => {
        if (history.length === 0) return;
        const prevState = history[history.length - 1];
        setPivot(prevState.pivot);
        setBlocks(prevState.blocks);
        setHistory(history.slice(0, -1));
        setStatus('playing');
        setMessage('');
        setChallengeCompleted(false);
        setSheetStatus('idle');
      };

      const restartLevel = () => {
        setPivot(level.startPivot);
        setBlocks(level.startBlocks);
        setStatus('playing');
        setMessage('');
        setHistory([]);
        setSeconds(0);
        setChallengeCompleted(false);
        setSheetStatus('idle');
        resetCommandUI();
      };

      // --- MOUSE & TOUCH INTERACTION ON CANVAS ---
      const getCanvasMousePos = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return { x: 0, y: 0 };
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const cx = clientX - rect.left;
        const cy = clientY - rect.top;
        
        const gx = cx / cellSize;
        const gy = (canvasHeight - cy) / cellSize;
        return { x: gx, y: gy };
      };

      const handleInteractionStart = (e) => {
        if (status !== 'playing') return;
        const mouseGrid = getCanvasMousePos(e);
        const distToPivot = Math.hypot(mouseGrid.x - pivot.x, mouseGrid.y - pivot.y);
        if (distToPivot < 0.45) {
          setIsDragging(true);
          setActiveTab('translate'); 
        }
      };

      const handleInteractionMove = (e) => {
        if (!isDragging || status !== 'playing') return;
        e.preventDefault();
        const mouseGrid = getCanvasMousePos(e);
        
        const targetX = Math.max(0, Math.min(GRID_W, Math.round(mouseGrid.x)));
        const targetY = Math.max(0, Math.min(GRID_H, Math.round(mouseGrid.y)));
        
        const diffX = targetX - pivot.x;
        const diffY = targetY - pivot.y;
        
        setTransDistX(Math.abs(diffX));
        setTransDirX(diffX >= 0 ? 'right' : 'left');
        setTransDistY(Math.abs(diffY));
        setTransDirY(diffY >= 0 ? 'up' : 'down');
      };

      const handleInteractionEnd = () => {
        setIsDragging(false);
      };

      // --- RENDERING CANVAS ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !gameStarted) return;
        const ctx = canvas.getContext('2d');
        
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvasWidth * dpr;
        canvas.height = canvasHeight * dpr;
        ctx.scale(dpr, dpr);

        ctx.clearRect(0, 0, canvasWidth, canvasHeight);

        const getCellRect = (gx, gy) => {
          return {
            x: gx * cellSize,
            y: canvasHeight - (gy + 1) * cellSize,
            w: cellSize,
            h: cellSize
          };
        };

        const getVertexPos = (vx, vy) => {
          return {
            cx: vx * cellSize,
            cy: canvasHeight - vy * cellSize
          };
        };

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        ctx.strokeStyle = '#e5e7eb'; 
        ctx.lineWidth = 1;
        for (let x = 0; x <= GRID_W; x++) {
          ctx.beginPath(); 
          ctx.moveTo(x * cellSize, 0); 
          ctx.lineTo(x * cellSize, canvasHeight); 
          ctx.stroke();
        }
        for (let y = 0; y <= GRID_H; y++) {
          ctx.beginPath(); 
          ctx.moveTo(0, y * cellSize); 
          ctx.lineTo(canvasWidth, y * cellSize); 
          ctx.stroke();
        }

        ctx.fillStyle = '#9ca3af'; 
        ctx.font = '10px monospace';
        for (let x = 1; x < GRID_W; x++) {
          ctx.fillText(x, x * cellSize + 4, canvasHeight - 4);
        }
        for (let y = 1; y < GRID_H; y++) {
          ctx.fillText(y, 4, canvasHeight - y * cellSize - 4);
        }

        const targetAbs = getAbsoluteCoords(level.targetPivot, level.targetBlocks);
        ctx.fillStyle = 'rgba(34, 197, 94, 0.15)'; 
        ctx.strokeStyle = '#16a34a'; 
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 2.5;
        targetAbs.forEach(coord => {
          const { x, y, w, h } = getCellRect(Math.floor(coord.x), Math.floor(coord.y));
          ctx.fillRect(x, y, w, h);
          ctx.strokeRect(x, y, w, h);
        });
        ctx.setLineDash([]); 

        ctx.fillStyle = '#fee2e2'; 
        level.obstacles.forEach(obs => {
          const { x, y, w, h } = getCellRect(obs.x, obs.y);
          ctx.fillRect(x, y, w, h);
          
          ctx.strokeStyle = '#ef4444'; 
          ctx.lineWidth = 1.5;
          ctx.strokeRect(x, y, w, h);

          ctx.strokeStyle = '#f87171';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x, y); ctx.lineTo(x + w, y + h);
          ctx.moveTo(x + w, y); ctx.lineTo(x, y + h);
          ctx.stroke();
        });

        const isMoving = pendingState.pivot.x !== pivot.x || 
                         pendingState.pivot.y !== pivot.y || 
                         JSON.stringify(pendingState.blocks) !== JSON.stringify(blocks);
        
        if (isMoving && status === 'playing') {
          const ghostAbs = getAbsoluteCoords(pendingState.pivot, pendingState.blocks);
          ctx.fillStyle = 'rgba(156, 163, 175, 0.45)'; 
          ctx.strokeStyle = '#4b5563';
          ctx.setLineDash([4, 4]);
          ctx.lineWidth = 2;
          ghostAbs.forEach(coord => {
             const { x, y, w, h } = getCellRect(Math.floor(coord.x), Math.floor(coord.y));
             ctx.fillRect(x, y, w, h);
             ctx.strokeRect(x, y, w, h);
          });
          ctx.setLineDash([]);

          const ghostPivotCanvas = getVertexPos(pendingState.pivot.x, pendingState.pivot.y);
          ctx.fillStyle = 'rgba(239, 68, 68, 0.5)';
          ctx.beginPath();
          ctx.arc(ghostPivotCanvas.cx, ghostPivotCanvas.cy, 6, 0, Math.PI * 2);
          ctx.fill();
        }

        const currentAbs = getAbsoluteCoords(pivot, blocks);
        ctx.fillStyle = selectedColor.fill; 
        ctx.strokeStyle = selectedColor.border; 
        ctx.lineWidth = 2.5;
        currentAbs.forEach(coord => {
          const { x, y, w, h } = getCellRect(Math.floor(coord.x), Math.floor(coord.y));
          ctx.fillRect(x, y, w, h);
          ctx.strokeRect(x, y, w, h);
        });

        const pivotCanvas = getVertexPos(pivot.x, pivot.y);
        ctx.fillStyle = '#ef4444'; 
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(pivotCanvas.cx, pivotCanvas.cy, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

      }, [pivot, blocks, pendingState, level, status, selectedColor, cellSize, canvasWidth, canvasHeight, gameStarted]);

      const moveTally = useMemo(() => {
        return {
          t: history.filter(h => h.type === 'translate').length,
          r: history.filter(h => h.type === 'rotate').length,
          f: history.filter(h => h.type === 'reflect').length,
          total: history.length
        };
      }, [history]);

      // Handle Form Submission on Start Screen
      const handleStartGame = (e) => {
        e.preventDefault();
        if (studentName.trim().length > 0) {
          setGameStarted(true);
        }
      };

      // --- UI COMPONENTS ---
      const NumberSelect = ({ value, onChange, max }) => (
        <select 
          value={value} 
          onChange={e => onChange(parseInt(e.target.value))} 
          className="mx-1 px-1.5 py-0.5 border rounded bg-white font-mono text-base font-bold shadow-sm"
        >
          {[...Array(max + 1).keys()].map(n => <option key={n} value={n}>{n}</option>)}
        </select>
      );

      const renderCommandSentence = () => {
        if (activeTab === 'translate') {
          return (
            <div className="flex flex-wrap items-center gap-y-1.5 text-base font-medium text-gray-700 bg-gray-50 p-3 rounded-lg border border-gray-200">
              <span>"Move shape</span>
              <NumberSelect value={transDistX} onChange={setTransDistX} max={15} />
              <span>sq.</span>
              <select value={transDirX} onChange={e => setTransDirX(e.target.value)} className="mx-1 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm">
                <option value="right">Right</option>
                <option value="left">Left</option>
              </select>
              <span>and</span>
              <NumberSelect value={transDistY} onChange={setTransDistY} max={15} />
              <span>sq.</span>
              <select value={transDirY} onChange={e => setTransDirY(e.target.value)} className="mx-1 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm">
                <option value="up">Up</option>
                <option value="down">Down</option>
              </select>
              <span>."</span>
            </div>
          );
        }
        if (activeTab === 'rotate') {
          return (
            <div className="flex flex-wrap items-center gap-y-1.5 text-base font-medium text-gray-700 bg-gray-50 p-3 rounded-lg border border-gray-200">
              <span>"Rotate shape</span>
              <select value={rotAngle} onChange={e => setRotAngle(e.target.value)} className="mx-1.5 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm">
                <option value="90">1/4 Turn (90°)</option>
                <option value="180">1/2 Turn (180°)</option>
                <option value="270">3/4 Turn (270°)</option>
              </select>
              <select value={rotDir} onChange={e => setRotDir(e.target.value)} className="mx-1.5 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm">
                <option value="cw">Clockwise</option>
                <option value="ccw">Counter-CW</option>
              </select>
              <span>around pivot."</span>
            </div>
          );
        }
        if (activeTab === 'reflect') {
          return (
            <div className="flex flex-wrap items-center gap-y-1.5 text-base font-medium text-gray-700 bg-gray-50 p-3 rounded-lg border border-gray-200">
              <span>"Reflect across a</span>
              <select value={reflectAxis} onChange={e => setReflectAxis(e.target.value)} className="mx-1.5 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm">
                <option value="vertical">Vertical</option>
                <option value="horizontal">Horizontal</option>
              </select>
              <span>mirror line on pivot."</span>
            </div>
          );
        }
      };

      // RENDER LOBBY START SCREEN
      if (!gameStarted) {
        return (
          <div className="min-h-screen w-full flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 p-4">
            <div className="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-slate-200 p-8 flex flex-col gap-6">
              
              <div className="text-center">
                <div className="mx-auto w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4 animate-bounce">
                  <span className="text-white text-3xl font-black">📐</span>
                </div>
                <h1 className="text-2xl font-black text-slate-800 tracking-tight">Geometry Arena</h1>
                <p className="text-sm text-slate-500 mt-1">Transform spatial figures & escape grid blockades</p>
              </div>

              <form onSubmit={handleStartGame} className="flex flex-col gap-4">
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-black text-slate-400 uppercase tracking-wider">Your Full Name</label>
                  <input
                    type="text"
                    required
                    value={studentName}
                    onChange={(e) => setStudentName(e.target.value)}
                    placeholder="Enter your first and last name..."
                    className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 font-semibold shadow-sm transition-all"
                  />
                </div>

                <div className="flex flex-col gap-1">
                  <label className="text-xs font-black text-slate-400 uppercase tracking-wider">Class / Period (Optional)</label>
                  <input
                    type="text"
                    value={classPeriod}
                    onChange={(e) => setClassPeriod(e.target.value)}
                    placeholder="e.g. Period 2 Geometry"
                    className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 font-semibold shadow-sm transition-all"
                  />
                </div>

                <button
                  type="submit"
                  className="w-full mt-2 py-4 bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-lg rounded-xl shadow-lg shadow-blue-500/20 transition-transform active:scale-95"
                >
                  Enter Geometry Arena
                </button>
              </form>

              <div className="border-t pt-4 text-center">
                <p className="text-xs text-slate-400 font-medium">
                  Your coordinates, translations, and star achievements are monitored and logged to the class scoreboard.
                </p>
              </div>

            </div>
          </div>
        );
      }

      // RENDER GAMEPLAY
      return (
        <div className="min-h-screen bg-gray-100 p-4 font-sans flex flex-col items-center justify-center">
          
          {/* Header Panel */}
          <div className="w-full max-w-[1200px] mb-3 flex flex-col md:flex-row justify-between items-start md:items-end gap-2">
            <div>
              <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight flex items-center gap-2">
                📐 Transformational Geometry Arena
              </h1>
              <p className="text-xs text-slate-500 mt-0.5">
                Active Student: <span className="font-bold text-blue-600">{studentName}</span> {classPeriod && `| Class: ${classPeriod}`}
              </p>
            </div>
            <div className="flex flex-wrap gap-1">
              {LEVEL_VARIATIONS.map((_, i) => (
                <button 
                  key={i} 
                  onClick={() => {
                    setLevelIdx(i);
                    setShowTrophyCelebration(false);
                  }}
                  className={`px-2.5 py-1 rounded-md text-xs font-bold transition-all ${
                    levelIdx === i 
                      ? 'bg-blue-600 text-white shadow' 
                      : i === 5 
                        ? 'bg-amber-100 text-amber-800 border border-amber-300 hover:bg-amber-200'
                        : 'bg-white text-slate-600 hover:bg-gray-50 border'
                  }`}
                >
                  {i === 5 ? '⭐ Bonus' : `Lvl ${i + 1}`}
                </button>
              ))}
            </div>
          </div>

          {/* Main Box Area */}
          <div className="w-full max-w-[1200px] flex flex-col lg:flex-row gap-4 items-stretch">
            
            {/* LEFT COMPONENT: Board Display Panel with Parent Resize Observer Container */}
            <div 
              className="flex-1 bg-white p-4 rounded-xl shadow-md border border-gray-200 flex flex-col justify-between"
              style={{ height: window.innerWidth >= 1024 ? `${canvasHeight + 110}px` : 'auto' }}
            >
              <div className="flex justify-between items-center mb-2">
                <h2 className="text-sm md:text-base font-bold text-slate-800 truncate pr-2">
                  {level.title}
                </h2>
                
                {/* Timer and Statistics Tracker HUD */}
                <div className="flex items-center gap-2 text-xs font-mono font-bold bg-slate-50 border px-2 py-1 rounded">
                  <span className="text-slate-500">⏳ {seconds}s</span>
                  <span className="text-slate-300">|</span>
                  <span className="text-slate-500">👟 {moveTally.total} Moves</span>
                </div>
              </div>
              
              {/* Parent Observed wrapper to dynamically resize cellular coordinate paper grid */}
              <div ref={containerRef} className="flex-1 w-full min-h-0 relative bg-slate-50 rounded-lg flex items-center justify-center">
                <div 
                  className="relative border border-gray-300 rounded-lg overflow-hidden bg-white shadow-inner select-none" 
                  style={{ width: canvasWidth, height: canvasHeight }}
                >
                  <canvas 
                    ref={canvasRef}
                    onMouseDown={handleInteractionStart}
                    onMouseMove={handleInteractionMove}
                    onMouseUp={handleInteractionEnd}
                    onMouseLeave={handleInteractionEnd}
                    onTouchStart={handleInteractionStart}
                    onTouchMove={handleInteractionMove}
                    onTouchEnd={handleInteractionEnd}
                    style={{ 
                      width: `${canvasWidth}px`, 
                      height: `${canvasHeight}px`, 
                      display: 'block',
                      cursor: isDragging ? 'grabbing' : 'grab'
                    }}
                  />
                  
                  {/* Overlay messages */}
                  {status !== 'playing' && !showTrophyCelebration && (
                    <div className="absolute inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center z-10">
                      <h3 className={`text-3xl font-black mb-2 ${status === 'won' ? 'text-green-600' : 'text-red-600'}`}>
                        {status === 'won' ? 'Puzzle Solved! 🎉' : 'Oops! 💥'}
                      </h3>
                      <p className="text-base text-slate-700 font-medium mb-3 max-w-md">{message}</p>
                      
                      {status === 'won' && (
                        <div className="bg-slate-50 border border-slate-200 p-3 rounded-lg mb-4 max-w-sm flex flex-col gap-2">
                          <div>
                            <p className="font-bold text-xs text-slate-800 mb-0.5">Challenge Check:</p>
                            <p className="text-xs text-slate-500 mb-1.5 italic">"{level.challengeText}"</p>
                            {challengeCompleted ? (
                              <span className="text-emerald-600 text-sm font-extrabold flex items-center justify-center gap-1">
                                ⭐ CHALLENGE COMPLETED! Excellent!
                              </span>
                            ) : (
                              <span className="text-slate-500 text-xs font-semibold">
                                Solved, but challenge target not met. Replay for the star!
                              </span>
                            )}
                          </div>
                          
                          {/* Live sheets synchronization logger state */}
                          <div className="border-t pt-2 text-xs">
                            {sheetStatus === 'sending' && <span className="text-blue-500 animate-pulse font-bold">Logging score to classroom spreadsheet...</span>}
                            {sheetStatus === 'success' && <span className="text-emerald-600 font-bold">✅ Progress Logged to Class Scoreboard!</span>}
                            {sheetStatus === 'error' && <span className="text-red-500 font-bold">❌ Score Submission Failed. Offline mode active.</span>}
                          </div>
                        </div>
                      )}

                      <div className="flex flex-wrap justify-center gap-2">
                        {status === 'crashed' && (
                          <button onClick={undo} className="px-4 py-2 bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold text-sm rounded-lg transition-colors">
                            Undo Last Move
                          </button>
                        )}
                        {status === 'won' && levelIdx < 5 && (
                          <button onClick={() => setLevelIdx(levelIdx + 1)} className="px-4 py-2 bg-green-500 hover:bg-green-600 text-white shadow font-bold text-sm rounded-lg transition-transform hover:scale-105">
                            Next Level
                          </button>
                        )}
                        <button onClick={restartLevel} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-sm rounded-lg transition-colors">
                          Restart Level
                        </button>
                      </div>
                    </div>
                  )}

                  {/* MARIO KART CELEBRATION */}
                  {showTrophyCelebration && (
                    <div className="absolute inset-0 bg-gradient-to-br from-indigo-900/95 via-purple-900/95 to-slate-900/95 flex flex-col items-center justify-center p-6 text-center text-white select-none z-10">
                      <div className="relative mb-4 animate-bounce">
                        <svg className="w-36 h-36 drop-shadow-[0_0_20px_rgba(251,191,36,0.8)]" viewBox="0 0 100 100">
                          <path d="M15,20 L20,15 L25,20 L20,25 Z" fill="#fef08a" />
                          <path d="M80,15 L85,10 L90,15 L85,20 Z" fill="#fef08a" />
                          <path d="M25,30 C15,30 15,45 25,50 Z" fill="#d97706" stroke="#fbbf24" strokeWidth="2" />
                          <path d="M75,30 C85,30 85,45 75,50 Z" fill="#d97706" stroke="#fbbf24" strokeWidth="2" />
                          <path d="M30,25 L70,25 L65,55 C65,65 35,65 35,55 Z" fill="#fbbf24" stroke="#f59e0b" strokeWidth="2" />
                          <rect x="45" y="60" width="10" height="15" fill="#f59e0b" />
                          <ellipse cx="50" cy="78" rx="20" ry="6" fill="#fbbf24" stroke="#f59e0b" strokeWidth="2" />
                          <path d="M50,33 L53,40 L60,41 L55,46 L57,53 L50,49 L43,53 L45,46 L40,41 L47,40 Z" fill="#fff" />
                        </svg>
                      </div>
                      <h3 className="text-3xl font-black text-amber-400 tracking-wide mb-1 animate-pulse">
                        CONGRATULATIONS!
                      </h3>
                      <p className="text-lg font-bold mb-2">You conquered all 5 core levels!</p>
                      <p className="text-xs text-slate-300 max-w-sm mb-5">
                        Ready to tackle the ultimate challenge to unlock custom figure coloring?
                      </p>
                      <div className="flex gap-2">
                        <button 
                          onClick={() => {
                            setLevelIdx(5); 
                            setShowTrophyCelebration(false);
                          }} 
                          className="px-5 py-2.5 bg-gradient-to-r from-amber-500 to-yellow-400 hover:from-amber-600 hover:to-yellow-500 text-amber-950 font-extrabold text-sm rounded-xl shadow-lg transition-transform hover:scale-105"
                        >
                          🚀 Enter the Bonus Level
                        </button>
                        <button 
                          onClick={() => {
                            setShowTrophyCelebration(false);
                            restartLevel();
                          }} 
                          className="px-4 py-2.5 bg-white/20 hover:bg-white/30 text-white font-bold text-sm rounded-xl transition-colors"
                        >
                          View Grid
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
              
              <div className="text-xs text-slate-600 bg-blue-50/60 p-2.5 rounded-lg border border-blue-100 flex flex-col gap-0.5 mt-2">
                <div><strong>Goal:</strong> {level.instructions}</div>
                <div className="text-purple-900"><strong>Challenge:</strong> {level.challengeText}</div>
              </div>
            </div>

            {/* RIGHT COMPONENT: Action Control Panel */}
            <div 
              className="w-full lg:w-[360px] bg-white rounded-xl shadow-md border border-gray-200 flex flex-col justify-between overflow-hidden"
              style={{ height: window.innerWidth >= 1024 ? `${canvasHeight + 110}px` : 'auto' }}
            >
              
              {/* Main Action Tabs */}
              <div className="flex bg-slate-100 border-b">
                {['translate', 'rotate', 'reflect'].map(tab => (
                  <button
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`flex-1 py-3 font-bold text-xs uppercase tracking-wider transition-colors
                      ${activeTab === tab ? 'bg-white text-blue-600 border-t-2 border-blue-600' : 'text-slate-500 hover:bg-slate-200 border-t-2 border-transparent'}`}
                  >
                    {tab}
                  </button>
                ))}
              </div>

              {/* Interactive Console HUD */}
              <div className="p-4 flex-1 flex flex-col justify-between gap-3">
                
                {/* Command Configurator */}
                <div>
                  <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Command Builder</h3>
                  {renderCommandSentence()}
                </div>

                {/* Live Stats Tally - Highly Compressed */}
                <div className="bg-slate-50 rounded-lg p-2.5 border border-slate-200 text-xs">
                  <div className="font-bold text-slate-700 mb-1.5 flex justify-between items-center">
                    <span>Active Movement counters</span>
                    <span className="font-mono bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-[10px] font-bold">Total: {history.length}</span>
                  </div>
                  <div className="grid grid-cols-3 gap-1.5 text-center font-mono">
                    <div className="bg-white px-1 py-1 rounded border">
                      <span className="block text-[10px] font-sans font-semibold text-slate-400">Translate</span>
                      <span className="text-sm font-bold text-blue-600">{moveTally.t}</span>
                    </div>
                    <div className="bg-white px-1 py-1 rounded border">
                      <span className="block text-[10px] font-sans font-semibold text-slate-400">Rotate</span>
                      <span className="text-sm font-bold text-purple-600">{moveTally.r}</span>
                    </div>
                    <div className="bg-white px-1 py-1 rounded border">
                      <span className="block text-[10px] font-sans font-semibold text-slate-400">Reflect</span>
                      <span className="text-sm font-bold text-pink-600">{moveTally.f}</span>
                    </div>
                  </div>
                </div>

                {/* Customizer Tray - Merged inside main view cleanly */}
                <div className="border-t border-dashed pt-3">
                  <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5 flex items-center justify-between">
                    <span>Custom block Color</span>
                    {!colorPickerUnlocked && (
                      <span className="text-[10px] bg-gray-100 text-gray-500 px-1 py-0.5 rounded border font-normal">🔒 Locked</span>
                    )}
                  </h3>
                  {colorPickerUnlocked ? (
                    <div className="flex gap-2">
                      {COLOR_PRESETS.map((color, i) => (
                        <button
                          key={i}
                          onClick={() => setSelectedColor(color)}
                          className={`w-7 h-7 rounded-full border-2 transition-transform duration-200 focus:outline-none ${
                            selectedColor.name === color.name ? 'scale-110 ring-2 ring-blue-300' : 'opacity-80 hover:opacity-100'
                          }`}
                          style={{ backgroundColor: color.fill, borderColor: color.border }}
                          title={color.name}
                        />
                      ))}
                    </div>
                  ) : (
                    <p className="text-[11px] text-slate-500 bg-slate-50 p-2 rounded border border-slate-100 italic">
                      Complete the final <strong>Bonus Level</strong> to unlock custom shapes colors!
                    </p>
                  )}
                </div>

                {/* Explainer / Hint Banner */}
                <div className="bg-yellow-50/70 border-l-2 border-yellow-400 p-2.5 text-[11px] text-yellow-900 rounded-r-lg">
                  <p className="font-bold mb-0.5">Ghost Preview Mode Active</p>
                  <p>Configure parameters above or <span className="font-bold">drag the red handle on the grid</span> to test your translations before clicking Commit.</p>
                </div>

                {/* Primary Action Commit Dock */}
                <div className="flex flex-col gap-2 pt-2 border-t">
                  <button 
                    onClick={commitMovement}
                    disabled={status !== 'playing'}
                    className="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed text-white font-extrabold text-base rounded-lg shadow-md transition-all active:scale-[0.98]"
                  >
                    Commit Movement
                  </button>
                  
                  <div className="flex gap-2">
                    <button 
                      onClick={undo}
                      disabled={history.length === 0 || status === 'won'}
                      className="flex-1 py-2 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 text-slate-700 font-bold text-xs rounded-lg transition-colors border"
                    >
                      Undo Step
                    </button>
                    <button 
                      onClick={rerollVariation}
                      className="flex-1 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold text-xs rounded-lg transition-colors border border-emerald-200"
                      title="Load another randomized puzzle for this level"
                    >
                      🔄 Reroll Puzzle
                    </button>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
