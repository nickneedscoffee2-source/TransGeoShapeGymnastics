    const getAbsoluteCoords = (pivot, blocks) => {
      return blocks.map(b => ({ x: pivot.x + b.x, y: pivot.y + b.y }));
    };

    // Standard Grid Collision Check
    const checkCollision = (absCoords, obstacles) => {
      for (let coord of absCoords) {
        const gridX = Math.floor(coord.x);
        const gridY = Math.floor(coord.y);
        if (obstacles.some(obs => obs.x === gridX && obs.y === gridY)) return true;
      }
      return false;
    };

    // Raycast / Sweep Collision Check to prevent jumping through walls
    const checkPathCollision = (startP, endP, blocks, obstacles) => {
      const dx = endP.x - startP.x;
      const dy = endP.y - startP.y;
      const steps = Math.max(Math.abs(dx), Math.abs(dy));
      if (steps === 0) return false;
      
      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        const midP = {
          x: Math.round(startP.x + dx * t),
          y: Math.round(startP.y + dy * t)
        };
        const absCoords = getAbsoluteCoords(midP, blocks);
        if (obstacles.some(obs => absCoords.some(c => Math.floor(c.x) === obs.x && Math.floor(c.y) === obs.y))) return true;
      }
      return false;
    };

    const checkWin = (currentCoords, targetCoords) => {
      if (currentCoords.length !== targetCoords.length) return false;
      for (let cc of currentCoords) {
        if (!targetCoords.some(tc => Math.abs(tc.x - cc.x) < 0.1 && Math.abs(tc.y - cc.y) < 0.1)) {
          return false;
        }
      }
      return true;
    };

    // --- MAIN COMPONENT ---

      function generateMathQuiz() {
          const isMult = Math.random() > 0.5;

          if (isMult) {
              a = Math.floor(Math.random() * 10) + 1;
              b = Math.floor(Math.random() * 10) + 1;

              answer = Math.floor(Math.random() * 10) + 1;
              a = answer * b;
              qStr = `${a} ÷ ${b}`;

          // Generate 3 wrong options
          let options = new Set([answer]);
          while(options.size < 4) {
              let offset = Math.floor(Math.random() * 10) - 5;
              if (offset === 0) offset = 1;
              let wrong = answer + offset;
              if (wrong > 0) options.add(wrong);

          let optionsArr = Array.from(options);

      const pendingState = useMemo(() => {

      useEffect(() => {

          // Ignore if user is typing in a native HTML text field
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

          if (activeTab === 'translate') {
            let dx = (transDirX === 'right' ? 1 : -1) * transDistX;
            let dy = (transDirY === 'up' ? 1 : -1) * transDistY;

            if (e.key === 'ArrowUp') dy += 1;
            else if (e.key === 'ArrowDown') dy -= 1;
            else if (e.key === 'ArrowRight') dx += 1;

            e.preventDefault(); 

            const newTargetX = pivot.x + dx;
            const newTargetY = pivot.y + dy;

            // Safe Bounding Box Drag Limits to keep shape entirely in view

            const minAllowedX = -Math.floor(minBlockX);
            const maxAllowedX = GRID_W - Math.ceil(maxBlockX);
            const minAllowedY = -Math.floor(minBlockY);
            const maxAllowedY = GRID_H - Math.ceil(maxBlockY);

            // Force clamp bounds
            const clampedX = Math.max(minAllowedX, Math.min(maxAllowedX, newTargetX));
            const clampedY = Math.max(minAllowedY, Math.min(maxAllowedY, newTargetY));

            const finalDx = clampedX - pivot.x;
            const finalDy = clampedY - pivot.y;

              const angles = ['90', '180', '270'];

              setRotDir(prev => prev === 'cw' ? 'ccw' : 'cw');
            }
          }
          else if (activeTab === 'reflect') {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {

              if (level.mirrorLines && level.mirrorLines.length > 0) {

                setSelectedMirrorLineIdx(nextIdx);
              }
            }
          }

        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [status, showContinueOffer, activeTab, transDistX, transDirX, transDistY, transDirY, rotAngle, selectedMirrorLineIdx, pivot, blocks, level.mirrorLines, mathQuiz, isGameOver]);

            return newTime;

        let timerId = null;
        if (status === 'playing' && gameStarted && !showContinueOffer && !mathQuiz && secondsLeft > 0) {
          timerId = setInterval(() => {

        }
        return () => {
          if (timerId) clearInterval(timerId);
        };
      }, [status, gameStarted, showContinueOffer, mathQuiz, secondsLeft]);

      function handleContinue() {
        setHasContinued(true);
        setShowContinueOffer(false);
        setSecondsLeft(maxTimeLimit);
        setMessage("Continued! Time restored.");
        setTimeout(() => setMessage(''), 3000);
      }

      function handleResetToLobby() {
        setStudentName('');
        setGameStarted(false);
        setIsGameOver(false);
        setShowTrophyCelebration(false);
        setShowContinueOffer(false);
        setLevelIdx(0);
        setVariationIdx(0);
      }

      function calculateScore(moveCount, finalSecondsLeft, isChallengeMet) {
        const baseScore = 1000;
        const speedBonus = finalSecondsLeft * 10;
        const efficiencyBonus = Math.max(0, (level.parMoves - moveCount) * 200);
        const challengeBonus = isChallengeMet ? 500 : 0;
        return baseScore + speedBonus + efficiencyBonus + challengeBonus;
      }

      async function logProgressToGoogleSheets(finalHistory, isChallengeMet) {
        if (!GOOGLE_SCRIPT_URL) {
          console.log("No Google Script App URL configured. Playing offline.");
          return;
        }

        setSheetStatus('sending');
        const translations = finalHistory.filter(h => h.type === 'translate').length;
        const rotations = finalHistory.filter(h => h.type === 'rotate').length;
        const reflections = finalHistory.filter(h => h.type === 'reflect').length;
        const totalMoves = finalHistory.length;
        const score = calculateScore(totalMoves, secondsLeft, isChallengeMet);

        const payload = {
          studentName: studentName,
          classPeriod: difficulty === 'narwhal' ? "MAGICAL NARWHAL" : difficulty.toUpperCase(),
          levelId: level.id,
          puzzleVariation: level.variationLabel,
          translations: translations,
          rotations: rotations,
          reflections: reflections,
          totalMoves: totalMoves,
          parMoves: level.parMoves,
          time: maxTimeLimit - secondsLeft,
          solved: "Yes",
          challengeCompleted: isChallengeMet ? "Yes" : "No",
          score: score
        };

        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          setSheetStatus('success');
        } catch (error) {
          console.error("Sheets log pipeline broken: ", error);
          setSheetStatus('error');
        }
      }

      function commitMovement() {
        if (status !== 'playing' || isGameOver || showContinueOffer || mathQuiz) return;

        if (activeTab === 'translate') {
          if (checkPathCollision(pivot, pendingState.pivot, blocks, currentObstacles)) {
            handleCrash("Path Blocked! Your shape crashed into a solid wall mid-slide.");
            return;
          }
        }

        const absPendingCoords = getAbsoluteCoords(pendingState.pivot, pendingState.blocks);
        
        const isOutOfBounds = absPendingCoords.some(c => 
          Math.floor(c.x) < 0 || Math.floor(c.x) >= GRID_W || 
          Math.floor(c.y) < 0 || Math.floor(c.y) >= GRID_H
        );

        if (isOutOfBounds) {
          setMessage("⚠️ MOVE REJECTED: Your shape would fall off the board! Adjust your numbers.");
          setTimeout(() => setMessage(''), 4000);
          return;
        }

        if (checkCollision(absPendingCoords, currentObstacles)) {
          handleCrash("Collision! Your shape landed on an obstacle.");
          return;
        }

        setPivot(pendingState.pivot);
        setBlocks(pendingState.blocks);
        
        const actionRecord = { pivot, blocks, type: activeTab };
        const updatedHistory = [...history, actionRecord];
        setHistory(updatedHistory);
        resetCommandUI();

        // --- CHECK TIME BONUS TILE ---
        if (timeBonusNode && timeBonusNode.active) {
          const overlapsBonus = absPendingCoords.some(c => Math.floor(c.x) === timeBonusNode.x && Math.floor(c.y) === timeBonusNode.y);
          if (overlapsBonus) {
            setTimeBonusNode(prev => ({ ...prev, active: false }));
            setSecondsLeft(s => s + 10);
            setBonusAlert({ title: "⏰ +10 SECONDS!", desc: "You grabbed the time bonus!" });
            setTimeout(() => setBonusAlert(null), 3000);
          }
        }

        const targetAbsCoords = getAbsoluteCoords(level.targetPivot, level.targetBlocks);
        if (checkWin(absPendingCoords, targetAbsCoords)) {
          
          const isChallengeMet = level.checkChallenge(updatedHistory);
          if (!isChallengeMet) {
            setStatus('crashed');
            setMessage("Target reached, but you didn't perform the exact movements requested! Hit Undo and try again using the proper moves.");
            return; 
          }

          setStatus('won');
          setChallengeCompleted(true);
          setIsNarwhalActive(false); 

          logProgressToGoogleSheets(updatedHistory, isChallengeMet);

          if (level.id === 5) {
            if (difficulty === 'expert') {
              setNarwhalUnlocked(true);
            }
            setTimeout(() => {
              setShowTrophyCelebration(true);
            }, 600);
          } else if (level.id === 6) {
            setColorPickerUnlocked(true);
            setMessage(`Amazing job, ${studentName}! You beat the Bonus Level and unlocked Custom Shape Colors! Choose a new color from the customization panel!`);
          } else {
            setMessage(`Terrific! You completed the objective.${isChallengeMet ? " And you solved the optional Challenge Objective! ⭐" : ""}`);
          }
        }
      }

      function undo() {
        if (history.length === 0) return;
        const prevState = history[history.length - 1];
        setPivot(prevState.pivot);
        setBlocks(prevState.blocks);
        setHistory(history.slice(0, -1));
        setStatus('playing');
        setMessage('');
        setChallengeCompleted(false);
        setSheetStatus('idle');
      }

      // --- MOUSE & TOUCH INTERACTION ON CANVAS (Click detection ONLY for Narwhal) ---
      function handleCanvasClick(e) {
        if (status !== 'playing' || showContinueOffer || mathQuiz || isGameOver) return;
        
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const relativeX = (clientX - rect.left) / rect.width;
        const relativeY = (clientY - rect.top) / rect.height;
        
        const gx = relativeX * GRID_W;
        const gy = (1 - relativeY) * GRID_H; 
        
        if (isNarwhalActive && narwhalRef.current) {
            const dist = Math.hypot(gx - narwhalRef.current.x, gy - narwhalRef.current.y);
            if (dist < 2.5) { 
                setIsNarwhalActive(false); 
                generateMathQuiz();
            }
        }
      }

      // --- RENDERING CANVAS ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !gameStarted) return;
        const ctx = canvas.getContext('2d');
        
        const dpr = window.devicePixelRatio || 1;
        canvas.width = CANVAS_WIDTH * dpr;
        canvas.height = CANVAS_HEIGHT * dpr;
        ctx.scale(dpr, dpr);

        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        const getCellRect = (gx, gy) => {
          return {
            x: gx * CELL_SIZE,
            y: CANVAS_HEIGHT - (gy + 1) * CELL_SIZE,
            w: CELL_SIZE,
            h: CELL_SIZE
          };
        };

        const getVertexPos = (vx, vy) => {
          return {
            cx: vx * CELL_SIZE,
            cy: CANVAS_HEIGHT - vy * CELL_SIZE
          };
        };

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        ctx.strokeStyle = '#e5e7eb'; 
        ctx.lineWidth = 1;
        for (let x = 0; x <= GRID_W; x++) {
          ctx.beginPath(); 
          ctx.moveTo(x * CELL_SIZE, 0); 
          ctx.lineTo(x * CELL_SIZE, CANVAS_HEIGHT); 
          ctx.stroke();
        }
        for (let y = 0; y <= GRID_H; y++) {
          ctx.beginPath(); 
          ctx.moveTo(0, y * CELL_SIZE); 
          ctx.lineTo(CANVAS_WIDTH, y * CELL_SIZE); 
          ctx.stroke();
        }

        ctx.fillStyle = '#9ca3af'; 
        ctx.font = '10px monospace';
        for (let x = 1; x < GRID_W; x++) {
          ctx.fillText(x, x * CELL_SIZE + 4, CANVAS_HEIGHT - 4);
        }
        for (let y = 1; y < GRID_H; y++) {
          ctx.fillText(y, 4, CANVAS_HEIGHT - y * CELL_SIZE - 4);
        }

        // Draw Explicit Red Dotted Mirror Lines
        if (level.mirrorLines && level.mirrorLines.length > 0) {
          level.mirrorLines.forEach((m, idx) => {
            ctx.strokeStyle = idx === selectedMirrorLineIdx ? '#ef4444' : '#fca5a5'; 
            ctx.lineWidth = idx === selectedMirrorLineIdx ? 3 : 2;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            if (m.axis === 'vertical') {
              const x = m.pos * CELL_SIZE;
              ctx.moveTo(x, 0);
              ctx.lineTo(x, CANVAS_HEIGHT);
            } else {
              const y = CANVAS_HEIGHT - m.pos * CELL_SIZE;
              ctx.moveTo(0, y);
              ctx.lineTo(CANVAS_WIDTH, y);
            }
            ctx.stroke();
          });
          ctx.setLineDash([]);
        }

        const targetAbs = getAbsoluteCoords(level.targetPivot, level.targetBlocks);
        ctx.fillStyle = 'rgba(34, 197, 94, 0.15)'; 
        ctx.strokeStyle = '#16a34a'; 
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 2.5;
        targetAbs.forEach(coord => {
          const { x, y, w, h } = getCellRect(Math.floor(coord.x), Math.floor(coord.y));
          ctx.fillRect(x, y, w, h);
          ctx.strokeRect(x, y, w, h);
        });
        ctx.setLineDash([]); 

        ctx.fillStyle = '#fee2e2'; 
        currentObstacles.forEach(obs => {
          const { x, y, w, h } = getCellRect(obs.x, obs.y);
          ctx.fillRect(x, y, w, h);
          
          ctx.strokeStyle = '#ef4444'; 
          ctx.lineWidth = 1.5;
          ctx.strokeRect(x, y, w, h);

          ctx.strokeStyle = '#f87171';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x, y); ctx.lineTo(x + w, y + h);
          ctx.moveTo(x + w, y); ctx.lineTo(x, y + h);
          ctx.stroke();
        });

        // Draw Secret Time Bonus Node
        if (timeBonusNode && timeBonusNode.active) {
          const { x, y, w, h } = getCellRect(timeBonusNode.x, timeBonusNode.y);
          ctx.fillStyle = 'rgba(16, 185, 129, 0.25)'; 
          ctx.fillRect(x, y, w, h);
          ctx.strokeStyle = '#10b981';
          ctx.lineWidth = 2;
          ctx.strokeRect(x, y, w, h);
          ctx.font = '22px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('⏱️', x + w/2, y + h/2 + 2);
        }

        const isMoving = pendingState.pivot.x !== pivot.x || 
                         pendingState.pivot.y !== pivot.y || 
                         JSON.stringify(pendingState.blocks) !== JSON.stringify(blocks);
        
        const pivotCanvas = getVertexPos(pivot.x, pivot.y);
        
        if (isMoving && status === 'playing') {
          const ghostAbs = getAbsoluteCoords(pendingState.pivot, pendingState.blocks);
          
          let pathBlocked = false;
          if (activeTab === 'translate') {
            pathBlocked = checkPathCollision(pivot, pendingState.pivot, blocks, currentObstacles);
          }
          
          const isOOB = ghostAbs.some(c => 
            Math.floor(c.x) < 0 || Math.floor(c.x) >= GRID_W || 
            Math.floor(c.y) < 0 || Math.floor(c.y) >= GRID_H
          );

          ctx.fillStyle = (pathBlocked || isOOB) ? 'rgba(239, 68, 68, 0.45)' : 'rgba(156, 163, 175, 0.45)'; 
          ctx.strokeStyle = (pathBlocked || isOOB) ? '#b91c1c' : '#4b5563';
          ctx.setLineDash([4, 4]);
          ctx.lineWidth = 2;
          ghostAbs.forEach(coord => {
             const { x, y, w, h } = getCellRect(Math.floor(coord.x), Math.floor(coord.y));
             ctx.fillRect(x, y, w, h);
             ctx.strokeRect(x, y, w, h);
          });
          ctx.setLineDash([]);

          const ghostPivotCanvas = getVertexPos(pendingState.pivot.x, pendingState.pivot.y);
          ctx.fillStyle = 'rgba(239, 68, 68, 0.5)';
          ctx.beginPath();
          ctx.arc(ghostPivotCanvas.cx, ghostPivotCanvas.cy, 6, 0, Math.PI * 2);
          ctx.fill();

          // --- GHOST AWARENESS LABELS (Draw Transformation Vector Details) ---
          ctx.fillStyle = '#1e3a8a';
          ctx.font = 'bold 16px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          
          let label = "";
          if (activeTab === 'translate') {
              const dx = pendingState.pivot.x - pivot.x;
              const dy = pendingState.pivot.y - pivot.y;
              label = `X: ${dx > 0 ? '+' : ''}${dx} | Y: ${dy > 0 ? '+' : ''}${dy}`;
              
              ctx.beginPath();
              ctx.moveTo(pivotCanvas.cx, pivotCanvas.cy);
              ctx.lineTo(ghostPivotCanvas.cx, ghostPivotCanvas.cy);
              ctx.strokeStyle = 'rgba(59, 130, 246, 0.8)'; 
              ctx.setLineDash([6, 6]);
              ctx.lineWidth = 3;
              ctx.stroke();
              ctx.setLineDash([]);
          } else if (activeTab === 'rotate') {
              label = `Rotate ${rotAngle}° ${rotDir.toUpperCase()}`;
          } else if (activeTab === 'reflect') {
              const mirror = level.mirrorLines[selectedMirrorLineIdx];
              if (mirror) {
                  label = `Reflect ${mirror.axis === 'vertical' ? 'X=' : 'Y='}${mirror.pos}`;
              }
          }

          const textMetrics = ctx.measureText(label);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.fillRoundRect = function(x, y, w, h, r) {
            this.beginPath(); this.moveTo(x+r, y); this.lineTo(x+w-r, y); this.quadraticCurveTo(x+w, y, x+w, y+r);
            this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h); this.lineTo(x+r, y+h);
            this.quadraticCurveTo(x, y+h, x, y+h-r); this.lineTo(x, y+r); this.quadraticCurveTo(x, y, x+r, y); this.closePath(); this.fill();
          };
          ctx.fillRoundRect(ghostPivotCanvas.cx - textMetrics.width/2 - 8, ghostPivotCanvas.cy - 30, textMetrics.width + 16, 22, 6);
          
          ctx.fillStyle = '#1e40af';
          ctx.fillText(label, ghostPivotCanvas.cx, ghostPivotCanvas.cy - 12);
        }

        const currentAbs = getAbsoluteCoords(pivot, blocks);
        ctx.fillStyle = selectedColor.fill; 
        ctx.strokeStyle = selectedColor.border; 
        ctx.lineWidth = 2.5;
        currentAbs.forEach(coord => {
          const { x, y, w, h } = getCellRect(Math.floor(coord.x), Math.floor(coord.y));
          ctx.fillRect(x, y, w, h);
          ctx.strokeRect(x, y, w, h);
        });

        ctx.fillStyle = '#ef4444'; 
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(pivotCanvas.cx, pivotCanvas.cy, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // 🐋 Draw Narwhal
        if (isNarwhalActive && narwhalRef.current) {
           const nw = narwhalRef.current;
           nw.x += nw.vx;
           nw.y += nw.vy;

           ctx.save();
           ctx.translate(nw.x * CELL_SIZE, CANVAS_HEIGHT - nw.y * CELL_SIZE);
           if (nw.vx < 0) ctx.scale(-1, 1); 
           ctx.font = '40px Arial';
           ctx.textAlign = 'center';
           ctx.textBaseline = 'middle';
           ctx.fillText('🐋', 0, 0);
           ctx.restore();

           if ((nw.vx > 0 && nw.x > GRID_W + 3) || (nw.vx < 0 && nw.x < -3)) {
               setIsNarwhalActive(false);
           }
        }

      }, [pivot, blocks, pendingState, level, status, selectedColor, gameStarted, selectedMirrorLineIdx, activeTab, currentObstacles, tick, isNarwhalActive, timeBonusNode]);

      function renderCommandSentence() {
        if (activeTab === 'translate') {
          return (
            <div className="flex flex-wrap items-center gap-y-1.5 text-base font-medium text-gray-700 bg-gray-50 p-3 rounded-lg border border-gray-200 shadow-inner">
              <span>"Move shape</span>
              <NumberSelect value={transDistY} onChange={setTransDistY} max={15} />
              <span>sq.</span>
              <select value={transDirY} onChange={e => setTransDirY(e.target.value)} className="mx-1 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm cursor-pointer focus:ring-1">
                <option value="up">Up</option>
                <option value="down">Down</option>
              </select>
              <span>and</span>
              <NumberSelect value={transDistX} onChange={setTransDistX} max={20} />
              <span>sq.</span>
              <select value={transDirX} onChange={e => setTransDirX(e.target.value)} className="mx-1 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm cursor-pointer focus:ring-1">
                <option value="right">Right</option>
                <option value="left">Left</option>
              </select>
              <span>."</span>
            </div>
          );
        }
        if (activeTab === 'rotate') {
          return (
            <div className="flex flex-wrap items-center gap-y-1.5 text-base font-medium text-gray-700 bg-gray-50 p-3 rounded-lg border border-gray-200">
              <span>"Rotate shape</span>
              <select value={rotAngle} onChange={e => setRotAngle(e.target.value)} className="mx-1.5 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm cursor-pointer focus:ring-1">
                <option value="90">1/4 Turn (90°)</option>
                <option value="180">1/2 Turn (180°)</option>
                <option value="270">3/4 Turn (270°)</option>
              </select>
              <select value={rotDir} onChange={e => setRotDir(e.target.value)} className="mx-1.5 px-1 py-0.5 border rounded bg-white text-blue-600 font-bold text-sm shadow-sm cursor-pointer focus:ring-1">
                <option value="cw">Clockwise</option>
                <option value="ccw">Counter-CW</option>
              </select>
              <span>around pivot."</span>
            </div>
          );
        }
        if (activeTab === 'reflect') {
          return (
            <div className="flex flex-wrap items-center gap-y-1.5 text-base font-medium text-gray-700 bg-gray-50 p-3 rounded-lg border border-gray-200">
              <span>"Reflect shape across </span>
              <select 
                value={selectedMirrorLineIdx} 
                onChange={e => setSelectedMirrorLineIdx(parseInt(e.target.value))} 
                className="mx-1.5 px-1 py-0.5 border rounded bg-white text-red-600 font-bold text-sm shadow-sm cursor-pointer focus:ring-1"
              >
                {level.mirrorLines && level.mirrorLines.map((m, i) => (
                  <option key={i} value={i}>
                    {m.axis === 'vertical' ? `Vertical Line X=${m.pos}` : `Horizontal Line Y=${m.pos}`}
                  </option>
                ))}
              </select>
              <span>."</span>
            </div>
          );
        }
        return null;
      }

      // RENDER LOBBY START SCREEN
      if (!gameStarted) {
        return (
          <div className="min-h-screen w-full flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 p-4">
            <div className="w-full max-w-lg bg-white rounded-2xl shadow-2xl border border-slate-200 p-8 flex flex-col gap-6">
              
              <div className="text-center">
                <div className="mx-auto w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4 animate-bounce">
                  <span className="text-white text-3xl font-black">📐</span>
                </div>
                <h1 className="text-2xl font-black text-slate-800 tracking-tight">Geometry Arena</h1>
                <p className="text-sm text-slate-500 mt-1">Transform spatial figures & escape grid blockades</p>
              </div>

              <form onSubmit={handleStartGame} className="flex flex-col gap-5">
                <div className="flex flex-col gap-1">
                  <label className="text-xs font-black text-slate-400 uppercase tracking-wider">Your Full Name</label>
                  <input
                    type="text"
                    required
                    value={studentName}
                    onChange={(e) => setStudentName(e.target.value)}
                    placeholder="Enter your first and last name..."
                    className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 font-semibold shadow-sm transition-all"
                  />
                </div>

                {/* Difficulty Selector Form Field */}
                <div className="flex flex-col gap-2">
                  <label className="text-xs font-black text-slate-400 uppercase tracking-wider">Select Difficulty</label>
                  <div className="grid grid-cols-2 gap-2">
                    {[
                      { key: 'easy', label: 'Easy', desc: '1:30 Min Timer', color: 'border-green-500 text-green-700 bg-green-50', locked: false },
                      { key: 'medium', label: 'Medium', desc: '1 Min Timer', color: 'border-blue-500 text-blue-700 bg-blue-50', locked: false },
                      { key: 'expert', label: 'Expert', desc: '30 Sec Timer', color: 'border-red-500 text-red-700 bg-red-50', locked: false },
                      { 
                        key: 'narwhal', 
                        label: '🐋 Narwhal Mode', 
                        desc: '15 Sec Timer', 
                        color: 'border-fuchsia-500 text-fuchsia-700 bg-fuchsia-50', 
                        locked: !narwhalUnlocked 
                      }
                    ].map((diff) => (
                      <button
                        key={diff.key}
                        type="button"
                        disabled={diff.locked}
                        onClick={() => setDifficulty(diff.key)}
                        className={`flex flex-col items-center justify-center p-3 rounded-xl border-2 transition-all relative ${
                          diff.locked ? 'opacity-40 bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed' :
                          difficulty === diff.key 
                            ? `${diff.color} ring-2 ring-offset-2 ring-blue-400 font-black scale-105 shadow-md`
                            : 'border-slate-200 hover:bg-slate-50 font-semibold text-slate-500'
                        }`}
                      >
                        <span className="text-sm flex items-center gap-1">
                          {diff.label}
                          {diff.locked && <span className="text-xs">🔒</span>}
                        </span>
                        <span className="text-[10px] opacity-80 mt-0.5">
                          {diff.locked ? "Beat Expert to Unlock" : diff.desc}
                        </span>
                      </button>
                    ))}
                  </div>
                </div>

                <button
                  type="submit"
                  className="w-full mt-2 py-4 bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-lg rounded-xl shadow-lg shadow-blue-500/20 transition-transform active:scale-95"
                >
                  Enter Geometry Arena
                </button>
              </form>

              <div className="border-t pt-4 text-center">
                <p className="text-xs text-slate-400 font-medium">
                  Your coordinates, translations, and star achievements are monitored and logged to the class scoreboard.
                </p>
              </div>

            </div>
          </div>
        );
      }

      // RENDER CONTINUE MODAL (Only when time runs out on first try)
      if (showContinueOffer) {
        return (
          <div className="min-h-screen w-full flex items-center justify-center bg-slate-900/90 p-4 z-50">
            <div className="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 text-center flex flex-col gap-6">
              <div className="text-5xl animate-pulse">⏰</div>
              <h1 className="text-3xl font-black text-slate-800">Time's Up!</h1>
              <p className="text-slate-600 font-medium">
                You ran out of time on this puzzle, {studentName}!
              </p>
              <p className="text-sm font-bold text-purple-600">
                You have 1 Continue available to keep your progress on this board.
              </p>
              <div className="flex flex-col gap-2">
                <button
                  onClick={handleContinue}
                  className="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-extrabold text-lg rounded-xl transition-all shadow-lg active:scale-95"
                >
                  Use Continue
                </button>
                <button
                  onClick={handleResetToLobby}
                  className="w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-all"
                >
                  Give Up & Restart Level
                </button>
              </div>
            </div>
          </div>
        );
      }

      // RENDER GAMEPLAY
      return (
        <div className="h-screen w-full bg-gray-100 p-4 flex flex-col items-center justify-between overflow-hidden">
          
          {/* Header Panel */}
          <div className="w-full max-w-[1200px] flex flex-col md:flex-row justify-between items-start md:items-end gap-2 shrink-0 pb-1 border-b">
            <div>
              <h1 className="text-2xl font-extrabold text-slate-800 tracking-tight flex items-center gap-2">
                📐 Transformational Geometry Arena
              </h1>
              <p className="text-xs text-slate-500 mt-0.5">
                Active Student: <span className="font-bold text-blue-600">{studentName}</span> | Difficulty: <span className={`font-bold uppercase ${difficulty === 'narwhal' ? 'text-fuchsia-600 animate-pulse' : difficulty === 'expert' ? 'text-red-600' : difficulty === 'medium' ? 'text-blue-600' : 'text-green-600'}`}>{difficulty === 'narwhal' ? "🐋 Magical Narwhal" : difficulty}</span>
              </p>
            </div>
            <div className="flex flex-wrap gap-1">
              {LEVEL_VARIATIONS.map((_, i) => (
                <button 
                  key={i} 
                  onClick={() => {
                    setLevelIdx(i);
                    setShowTrophyCelebration(false);
                  }}
                  className={`px-2.5 py-1 rounded-md text-xs font-bold transition-all ${
                    levelIdx === i 
                      ? 'bg-blue-600 text-white shadow-md' 
                      : i === 5 
                        ? 'bg-amber-100 text-amber-800 border border-amber-300 hover:bg-amber-200'
                        : 'bg-white text-slate-600 hover:bg-gray-50 border'
                  }`}
                >
                  {i === 5 ? '⭐ Bonus' : `Lvl ${i + 1}`}
                </button>
              ))}
            </div>
          </div>

          {/* Main Box Area (Flex height-bound to fit the screen without scrolling) */}
          <div className="w-full max-w-[1200px] flex-1 min-h-0 flex flex-col lg:flex-row gap-4 items-stretch justify-center pb-2">
            
            {/* LEFT COMPONENT: Board Display Panel (Proportionally Scaled with Aspect containment) */}
            <div className="flex-1 min-h-0 bg-white p-4 rounded-xl shadow-md border border-gray-200 flex flex-col justify-between overflow-hidden relative">
              
              <div className="flex flex-col mb-1.5 shrink-0">
                 <div className="flex justify-between items-center w-full">
                    <h2 className="text-sm md:text-base font-bold text-slate-800 truncate pr-2">
                      {level.title}
                    </h2>
                    
                    {/* Simplified Stats Tracker HUD - No Lives */}
                    <div className="flex items-center gap-2 text-[11px] font-mono font-bold bg-slate-50 border px-2 py-1 rounded">
                      <span className="text-slate-500">👟 {moveTally.total} Moves</span>
                      <span className="text-slate-300">|</span>
                      <span className={`font-mono font-bold ${secondsLeft <= 10 ? "text-red-600 animate-pulse" : "text-slate-600"}`}>
                        ⏱ {Math.floor(secondsLeft / 60)}:{(secondsLeft % 60).toString().padStart(2, '0')}
                      </span>
                    </div>
                 </div>

                 {/* Shrinking Animated Time Bar */}
                 <div className="w-full bg-slate-200 rounded-full h-2.5 mt-2 overflow-hidden shadow-inner">
                   <div className={`h-2.5 rounded-full transition-all duration-1000 ease-linear ${secondsLeft < 15 ? 'bg-red-500 animate-pulse' : secondsLeft < 30 ? 'bg-yellow-400' : 'bg-emerald-500'}`} style={{ width: `${Math.max(0, (secondsLeft / maxTimeLimit) * 100)}%` }}></div>
                 </div>
              </div>
              
              {/* This container dynamically holds the aspect-constrained canvas */}
              <div className="flex-1 min-h-0 w-full flex items-center justify-center overflow-hidden bg-slate-50 rounded-lg p-2 relative">
                <div 
                  className="relative border border-gray-300 rounded-lg overflow-hidden bg-white shadow-inner"
                  style={{
                    width: '100%',
                    height: '100%',
                    maxWidth: `${CANVAS_WIDTH}px`,
                    maxHeight: `${CANVAS_HEIGHT}px`,
                    aspectRatio: '20/15'
                  }}
                >
                  <canvas 
                    ref={canvasRef}
                    onMouseDown={handleCanvasClick}
                    onTouchStart={handleCanvasClick}
                    style={{ 
                      width: '100%',
                      height: '100%',
                      display: 'block',
                      cursor: isNarwhalActive ? 'crosshair' : 'default',
                      objectFit: 'contain'
                    }}
                  />
                  
                  {/* MATH QUIZ MODAL FOR NARWHAL */}
                  {mathQuiz && (
                    <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center z-30">
                      <div className="bg-white rounded-2xl shadow-2xl p-6 md:p-8 max-w-sm w-full">
                         <h3 className="text-xl md:text-2xl font-black text-fuchsia-600 mb-2">🐋 Narwhal Caught!</h3>
                         <p className="text-slate-600 font-bold mb-4">Quick! Answer this to gain bonus time!</p>
                         
                         <div className="text-4xl md:text-5xl font-black text-slate-800 mb-6 bg-slate-100 py-4 rounded-xl border border-slate-200 shadow-inner">
                            {mathQuiz.question} = ?
                         </div>

                         <div className="grid grid-cols-2 gap-3 mb-4">
                            {mathQuiz.options.map((opt, i) => (
                               <button 
                                 key={i} 
                                 onClick={() => handleQuizAnswer(opt)}
                                 className="py-3 bg-blue-100 hover:bg-blue-600 hover:text-white text-blue-900 font-extrabold text-xl rounded-xl transition-colors border-2 border-blue-200 hover:border-blue-700 shadow-sm"
                               >
                                  {opt}
                               </button>
                            ))}
                         </div>
                         
                         <div className="w-full bg-slate-200 rounded-full h-3 mb-2 overflow-hidden">
                           <div className="bg-red-500 h-3 rounded-full transition-all duration-1000 ease-linear" style={{ width: `${(mathQuiz.timeLeft / 7) * 100}%` }}></div>
                         </div>
                         <p className="text-red-500 font-bold text-xs uppercase tracking-widest">{mathQuiz.timeLeft} Seconds Left!</p>
                      </div>
                    </div>
                  )}

                  {/* Bonus Trigger Modal Alert */}
                  {bonusAlert && (
                    <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-yellow-400 text-yellow-950 px-6 py-3 rounded-2xl shadow-xl border-4 border-yellow-200 z-20 text-center animate-bounce">
                      <h4 className="font-black text-lg">{bonusAlert.title}</h4>
                      <p className="font-bold text-sm">{bonusAlert.desc}</p>
                    </div>
                  )}

                  {/* Overlay messages */}
                  {status !== 'playing' && !showTrophyCelebration && (
                    <div className="absolute inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center z-10">
                      <h3 className={`text-2xl md:text-3xl font-black mb-1 md:mb-2 ${status === 'won' ? 'text-green-600' : 'text-red-600'}`}>
                        {status === 'won' ? 'Puzzle Solved! 🎉' : 'Oops! 💥'}
                      </h3>
                      <p className="text-xs md:text-sm text-slate-700 font-medium mb-2 max-w-md px-4">{message}</p>
                      
                      {status === 'won' && (
                        <div className="bg-slate-50 border border-slate-200 p-2 md:p-3 rounded-lg mb-3 w-full max-w-sm flex flex-col gap-1 md:gap-2">
                          <div>
                            <p className="font-bold text-[10px] md:text-xs text-slate-800 mb-0.5">Challenge Check:</p>
                            <p className="text-[10px] md:text-xs text-slate-500 mb-1 italic">"{level.challengeText}"</p>
                            {challengeCompleted ? (
                              <span className="text-emerald-600 text-sm font-extrabold flex items-center justify-center gap-1">
                                ⭐ CHALLENGE COMPLETED! Excellent!
                              </span>
                            ) : (
                              <span className="text-slate-500 text-[10px] md:text-xs font-semibold">
                                Solved, but challenge target not met. Replay for the star!
                              </span>
                            )}
                          </div>
                          
                          {/* Live sheets synchronization logger state */}
                          <div className="border-t pt-1.5 text-[10px] md:text-xs">
                            {sheetStatus === 'sending' && <span className="text-blue-500 animate-pulse font-bold">Logging score to classroom spreadsheet...</span>}
                            {sheetStatus === 'success' && <span className="text-emerald-600 font-bold">✅ Progress Logged to Class Scoreboard!</span>}
                            {sheetStatus === 'error' && <span className="text-red-500 font-bold">❌ Score Submission Failed. Offline mode active.</span>}
                          </div>
                        </div>
                      )}

                      <div className="flex flex-wrap justify-center gap-1.5">
                        {status === 'won' && levelIdx < 5 && (
                          <button onClick={() => setLevelIdx(levelIdx + 1)} className="px-3.5 py-1.5 bg-green-500 hover:bg-green-600 text-white shadow font-bold text-xs md:text-sm rounded-lg transition-transform hover:scale-105">
                            Next Level
                          </button>
                        )}
                        {status === 'crashed' && (
                          <button onClick={undo} className="px-3.5 py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold text-xs md:text-sm rounded-lg transition-colors">
                            Undo Last Move
                          </button>
                        )}
                        <button onClick={restartLevel} className="px-3.5 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-xs md:text-sm rounded-lg transition-colors">
                          Restart Level
                        </button>
                      </div>
                    </div>
                  )}

                  {/* DYNAMIC MARIO KART STYLE CELEBRATION */}
                  {showTrophyCelebration && (
                    <div className="absolute inset-0 bg-gradient-to-br from-indigo-950 via-purple-950 to-slate-950 flex flex-col items-center justify-center p-6 text-center text-white select-none z-10">
                      
                      {/* Expert Champion vs Magical Narwhal Champion Cup */}
                      {difficulty === 'narwhal' ? (
                        <div className="relative mb-3 animate-pulse">
                          {/* Beautiful Animated SVG Happy Narwhal holding trophy */}
                          <svg className="w-40 h-40 md:w-56 md:h-56 drop-shadow-[0_0_35px_rgba(236,72,153,0.8)]" viewBox="0 0 120 120">
                            {/* Water Bubbles */}
                            <circle cx="20" cy="30" r="3" fill="#38bdf8" className="animate-bounce" />
                            <circle cx="100" cy="40" r="4" fill="#38bdf8" className="animate-bounce" style={{animationDelay: '0.3s'}} />
                            <circle cx="50" cy="15" r="2" fill="#38bdf8" className="animate-bounce" style={{animationDelay: '0.6s'}} />

                            {/* Narwhal Horn (Golden Spiral Tusk) */}
                            <polygon points="35,50 15,30 30,45" fill="#facc15" stroke="#fbbf24" strokeWidth="1" />
                            
                            {/* Narwhal Body */}
                            <path d="M 30 70 Q 50 40 85 55 T 115 65 Q 110 75 95 72 T 65 75 Q 45 85 30 70 Z" fill="#818cf8" stroke="#4f46e5" strokeWidth="2" />
                            
                            {/* Tail Fin */}
                            <path d="M 115 65 L 122 55 L 120 67 L 123 75 Z" fill="#818cf8" stroke="#4f46e5" strokeWidth="1.5" />
                            
                            {/* Friendly Eye and Smile */}
                            <circle cx="45" cy="60" r="3" fill="#0f172a" />
                            <path d="M 42 66 Q 45 70 48 66" fill="none" stroke="#0f172a" strokeWidth="2" strokeLinecap="round" />
                            
                            {/* Little Flippers (Arms) Holding Trophy */}
                            <path d="M 58 72 Q 52 82 62 82 Z" fill="#6366f1" />
                            
                            {/* Shiny Gold Trophy Cup held by Narwhal */}
                            <g transform="translate(58, 64) scale(0.35)">
                              <path d="M20,25 C5,25 5,45 20,55 Z" fill="#d97706" stroke="#fbbf24" strokeWidth="2" />
                              <path d="M80,25 C95,25 95,45 80,55 Z" fill="#d97706" stroke="#fbbf24" strokeWidth="2" />
                              <path d="M25,20 L75,20 L70,55 C70,68 30,68 30,55 Z" fill="#fbbf24" stroke="#f59e0b" strokeWidth="3" />
                              <rect x="44" y="62" width="12" height="18" fill="#f59e0b" />
                              <ellipse cx="50" cy="80" rx="25" ry="8" fill="#fbbf24" stroke="#f59e0b" strokeWidth="2" />
                            </g>
                          </svg>
                          <div className="absolute top-0 right-0 bg-fuchsia-600 text-white font-black text-[10px] px-2.5 py-1 rounded-full rotate-12 shadow animate-bounce">
                            🐋 NARWHAL MASTER
                          </div>
                        </div>
                      ) : difficulty === 'expert' ? (
                        <div className="relative mb-3 animate-pulse">
                          <svg className="w-36 h-36 md:w-48 md:h-48 drop-shadow-[0_0_35px_rgba(251,191,36,1)]" viewBox="0 0 100 100">
                            {/* Star Sparkles */}
                            <path d="M10,25 L15,20 L20,25 L15,30 Z" fill="#fff" className="animate-ping" />
                            <path d="M80,20 L85,15 L90,20 L85,25 Z" fill="#fff" className="animate-ping" style={{animationDelay: '0.5s'}} />
                            <path d="M45,10 L50,5 L55,10 L50,15 Z" fill="#fff" className="animate-ping" style={{animationDelay: '1s'}} />
                            
                            {/* Grand Double Handles */}
                            <path d="M20,25 C5,25 5,45 20,55 Z" fill="#b45309" stroke="#fbbf24" strokeWidth="3" />
                            <path d="M80,25 C95,25 95,45 80,55 Z" fill="#b45309" stroke="#fbbf24" strokeWidth="3" />
                            
                            {/* Giant Trophy Cup */}
                            <path d="M25,20 L75,20 L70,55 C70,68 30,68 30,55 Z" fill="#fbbf24" stroke="#f59e0b" strokeWidth="3" />
                            <rect x="44" y="62" width="12" height="18" fill="#f59e0b" />
                            <ellipse cx="50" cy="80" rx="25" ry="8" fill="#fbbf24" stroke="#f59e0b" strokeWidth="3" />
                            
                            {/* Expert Champion Medal on Cup */}
                            <path d="M50,30 L55,38 L65,39 L57,46 L60,55 L50,50 L40,55 L43,46 L35,39 L45,38 Z" fill="#ef4444" stroke="#fff" strokeWidth="1" />
                          </svg>
                          <div className="absolute top-0 right-0 bg-red-600 text-white font-black text-[10px] px-2 py-0.5 rounded-full rotate-12 shadow animate-bounce">
                            EXPERT CHAMPION
                          </div>
                        </div>
                      ) : (
                        <div className="relative mb-3 animate-bounce">
                          <svg className="w-24 h-24 md:w-32 md:h-32 drop-shadow-[0_0_20px_rgba(251,191,36,0.8)]" viewBox="0 0 100 100">
                            <path d="M15,20 L20,15 L25,20 L20,25 Z" fill="#fef08a" />
                            <path d="M80,15 L85,10 L90,15 L85,20 Z" fill="#fef08a" />
                            <path d="M25,30 C15,30 15,45 25,50 Z" fill="#d97706" stroke="#fbbf24" strokeWidth="2" />
                            <path d="M75,30 C85,30 85,45 75,50 Z" fill="#d97706" stroke="#fbbf24" strokeWidth="2" />
                            <path d="M30,25 L70,25 L65,55 C65,65 35,65 35,55 Z" fill="#fbbf24" stroke="#f59e0b" strokeWidth="2" />
                            <rect x="45" y="60" width="10" height="15" fill="#f59e0b" />
                            <ellipse cx="50" cy="78" rx="20" ry="6" fill="#fbbf24" stroke="#f59e0b" strokeWidth="2" />
                            <path d="M50,33 L53,40 L60,41 L55,46 L57,53 L50,49 L43,53 L45,46 L40,41 L47,40 Z" fill="#fff" />
                          </svg>
                        </div>
                      )}

                      <h3 className={`font-black tracking-wide mb-2 drop-shadow-[0_4px_12px_rgba(0,0,0,0.6)] ${difficulty === 'narwhal' ? 'text-2xl md:text-4xl text-fuchsia-400 animate-bounce' : difficulty === 'expert' ? 'text-3xl md:text-5xl text-yellow-400 animate-pulse' : 'text-2xl md:text-3xl text-amber-400'}`}>
                        {difficulty === 'narwhal' ? 'You Are The Champion Of The Great Lakes! 🌊' : difficulty === 'expert' ? '🏆 EXPERT CHAMPION! 🏆' : 'CONGRATULATIONS!'}
                      </h3>
                      <p className="text-sm md:text-lg font-bold mb-1">
                        {difficulty === 'narwhal' ? `Simply outstanding, ${studentName}! You conquered the legendary 15-second limits!` : difficulty === 'expert' ? `Expert Mode Cleared! You unlocked a mystical new challenge on the Lobby start screen!` : `You conquered all 5 core levels, ${studentName}!`}
                      </p>
                      <p className="text-[10px] md:text-xs text-slate-300 max-w-sm mb-4">
                        {difficulty === 'narwhal' ? "You have achieved perfect transformation fluency. The Great Lakes salute your genius!" : difficulty === 'expert' ? "Head back to the start screen to select the locked '🐋 Magical Narwhal' difficulty!" : "Ready to tackle the ultimate challenge to unlock custom figure coloring?"}
                      </p>
                      <div className="flex gap-2">
                        {difficulty === 'expert' ? (
                          <button 
                            onClick={handleResetToLobby}
                            className="px-5 py-2.5 bg-gradient-to-r from-fuchsia-500 to-indigo-500 hover:from-fuchsia-600 hover:to-indigo-600 text-white font-extrabold text-xs md:text-sm rounded-xl shadow-lg transition-transform hover:scale-105"
                          >
                            🐋 Play Magical Narwhal Mode!
                          </button>
                        ) : (
                          <button 
                            onClick={() => {
                              setLevelIdx(5); 
                              setShowTrophyCelebration(false);
                            }} 
                            className="px-4 py-2 bg-gradient-to-r from-amber-500 to-yellow-400 hover:from-amber-600 hover:to-yellow-500 text-amber-950 font-extrabold text-xs md:text-sm rounded-xl shadow-lg transition-transform hover:scale-105"
                          >
                            🚀 Enter the Bonus Level
                          </button>
                        )}
                        <button 
                          onClick={() => {
                            setShowTrophyCelebration(false);
                            restartLevel();
                          }} 
                          className="px-3 py-2 bg-white/20 hover:bg-white/30 text-white font-bold text-xs md:text-sm rounded-xl transition-colors"
                        >
                          View Grid
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
              
              {/* ENLARGED GOAL AND CHALLENGE SECTION */}
              <div className="text-sm md:text-base lg:text-lg text-slate-800 bg-blue-50/80 p-4 rounded-xl border-2 border-blue-200 flex flex-col gap-1.5 mt-3 shrink-0 select-none shadow-sm">
                <div><strong className="text-blue-900">Goal:</strong> {level.instructions}</div>
                <div className="text-purple-900"><strong className="text-purple-950">Challenge:</strong> {level.challengeText}</div>
              </div>
            </div>

            {/* RIGHT COMPONENT: Action Control Panel */}
            <div className="w-full lg:w-[340px] bg-white rounded-xl shadow-md border border-gray-200 flex flex-col justify-between h-full min-h-0 overflow-hidden shrink-0">
              
              {/* Main Action Tabs */}
              <div className="flex bg-slate-100 border-b shrink-0">
                {['translate', 'rotate', 'reflect'].map(tab => (
                  <button
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`flex-1 py-3 font-bold text-xs uppercase tracking-wider transition-colors
                      ${activeTab === tab ? 'bg-white text-blue-600 border-t-2 border-blue-600' : 'text-slate-500 hover:bg-slate-200 border-t-2 border-transparent'}`}
                  >
                    {tab}
                  </button>
                ))}
              </div>

              {/* Interactive Console HUD */}
              <div className="p-4 flex-1 flex flex-col justify-between gap-3 overflow-y-auto">
                
                {/* Command Configurator */}
                <div>
                  <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Command Builder</h3>
                  {renderCommandSentence()}
                </div>

                {/* Live Stats Tally */}
                <div className="bg-slate-50 rounded-lg p-2.5 border border-slate-200 text-xs">
                  <div className="font-bold text-slate-700 mb-1.5 flex justify-between items-center">
                    <span>Active Movement counters</span>
                    <span className="font-mono bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded text-[10px] font-bold">Total: {history.length}</span>
                  </div>
                  <div className="grid grid-cols-3 gap-1.5 text-center font-mono">
                    <div className="bg-white px-1 py-1 rounded border">
                      <span className="block text-[10px] font-sans font-semibold text-slate-400">Translate</span>
                      <span className="text-sm font-bold text-blue-600">{moveTally.t}</span>
                    </div>
                    <div className="bg-white px-1 py-1 rounded border">
                      <span className="block text-[10px] font-sans font-semibold text-slate-400">Rotate</span>
                      <span className="text-sm font-bold text-purple-600">{moveTally.r}</span>
                    </div>
                    <div className="bg-white px-1 py-1 rounded border">
                      <span className="block text-[10px] font-sans font-semibold text-slate-400">Reflect</span>
                      <span className="text-sm font-bold text-pink-600">{moveTally.f}</span>
                    </div>
                  </div>
                </div>

                {/* Customizer Tray */}
                <div className="border-t border-dashed pt-3">
                  <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5 flex items-center justify-between">
                    <span>Custom block Color</span>
                    {!colorPickerUnlocked && (
                      <span className="text-[10px] bg-gray-100 text-gray-500 px-1 py-0.5 rounded border font-normal">🔒 Locked</span>
                    )}
                  </h3>
                  {colorPickerUnlocked ? (
                    <div className="flex gap-2">
                      {COLOR_PRESETS.map((color, i) => (
                        <button
                          key={i}
                          onClick={() => setSelectedColor(color)}
                          className={`w-7 h-7 rounded-full border-2 transition-transform duration-200 focus:outline-none ${
                            selectedColor.name === color.name ? 'scale-110 ring-2 ring-blue-300' : 'opacity-80 hover:opacity-100'
                          }`}
                          style={{ backgroundColor: color.fill, borderColor: color.border }}
                          title={color.name}
                        />
                      ))}
                    </div>
                  ) : (
                    <p className="text-[11px] text-slate-500 bg-slate-50 p-2 rounded border border-slate-100 italic">
                      Complete the final <strong>Bonus Level</strong> to unlock custom shapes colors!
                    </p>
                  )}
                </div>

                {/* Explainer / Hint Banner */}
                <div className="bg-yellow-50/70 border-l-2 border-yellow-400 p-2.5 text-[11px] text-yellow-900 rounded-r-lg">
                  <p className="font-bold mb-0.5">Ghost Preview Mode Active</p>
                  <p>Configure parameters above or <span className="font-bold">use keyboard arrows</span> to test your translations before clicking Commit.</p>
                </div>

                {/* Primary Action Commit Dock */}
                <div className="flex flex-col gap-2 pt-2 border-t shrink-0">
                  <button 
                    onClick={commitMovement}
                    disabled={status !== 'playing' || isGameOver}
                    className="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed text-white font-extrabold text-base rounded-lg shadow-md transition-all active:scale-[0.98]"
                  >
                    Commit Movement
                  </button>
                  
                  <div className="flex gap-2">
                    <button 
                      onClick={undo}
                      disabled={history.length === 0 || status === 'won'}
                      className="flex-1 py-2 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 text-slate-700 font-bold text-xs rounded-lg transition-colors border"
                    >
                      Undo Step
                    </button>
                    <button 
                      onClick={restartLevel}
                      className="flex-1 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold text-xs rounded-lg transition-colors border border-emerald-200"
                      title="Load another randomized puzzle for this level"
                    >
                      🔄 Reroll Puzzle
                    </button>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
